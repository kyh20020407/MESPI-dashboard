<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESPI - 메이플플래닛 통합 커뮤니티</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-dark: #222222;
            --text-light: #ffffff;
            --text-gray: #a0a0a0;
            --box-gray: #d9d9d9;
            --footer-bg: #1a1a1a;
            
            /* 글래스모피즘 공통 속성 정의 */
            --glass-bg: rgba(34, 34, 34, 0.4); /* 조금 더 투명하게 설정 */
            --glass-blur: blur(12px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        
        body { background-color: var(--bg-dark); color: var(--text-light); min-height: 100vh; display: flex; flex-direction: column; padding-top: 90px; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* 1. 상단 네비게이션 바 (글래스모피즘 적용) */
        header {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            height: 70px;
            
            /* 공통 변수 사용 */
            background: rgba(34, 34, 34, 0.6); /* 상단바는 가독성을 위해 살짝 더 진하게 */
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .header-left { display: flex; align-items: center; gap: 40px; }
        .logo { font-size: 32px; font-weight: 800; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .menu { display: flex; gap: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; margin-top: 10px; }
        .menu li a { font-size: 15px; color: var(--text-gray); transition: 0.2s; }
        .menu li a:hover { color: var(--text-light); text-shadow: 0 0 8px rgba(255,255,255,0.3); }

        .header-right { display: flex; align-items: center; gap: 20px; }
        .search-box { position: relative; display: flex; align-items: center; }
        .search-box input {
            background-color: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px;
            color: white; padding: 10px 40px 10px 20px; font-size: 14px; width: 250px; outline: none;
            transition: 0.3s;
        }
        .search-box input:focus { background-color: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.3); }
        .search-box input::placeholder { color: rgba(255,255,255,0.4); }
        .search-box i { position: absolute; right: 15px; color: rgba(255,255,255,0.4); cursor: pointer; }
        
        .login-btn { background: none; border: none; color: white; font-size: 15px; display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .login-btn:hover { text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .login-btn i { font-size: 20px; }

        /* 2. 메인 컨텐츠 영역 */
        main { padding: 30px; flex: 1; display: flex; flex-direction: column; gap: 30px; max-width: 1400px; margin: 0 auto; width: 100%; }

        .top-section { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; min-height: 350px; }

        .price-area { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .price-area h1 { font-size: 140px; font-weight: 800; letter-spacing: 5px; line-height: 1; margin-bottom: 10px; }
        .price-area p { font-size: 55px; font-weight: 400; color: var(--text-light); }

        .ad-area { background-color: var(--box-gray); color: black; display: flex; justify-content: center; align-items: center; font-size: 60px; font-weight: 700; border-radius: 4px; }

        /* [일관성 수정] 그래프 배경 유리질감으로 변경 */
        .bottom-section { 
            /* 기존 회색 배경 삭제 -> 유리 효과 적용 */
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            box-shadow: var(--glass-shadow);
            
            border-radius: 8px; /* 유리 질감에 어울리게 라운드 살짝 증가 */
            height: 500px; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            transition: 0.3s; /* 호버 효과를 위한 애니메이션 */
        }
        
        /* 호버 시 살짝 떠오르는 효과 (옵션) */
        .bottom-section:hover {
            background: rgba(255, 255, 255, 0.02); /* 배경색을 아주 조금 밝게 */
            border-color: rgba(255, 255, 255, 0.15); /* 테두리를 조금 더 선명하게 */
        }

        /* 배경이 어두워졌으므로 제목 글씨색을 흰색으로 변경 */
        .bottom-section h2 { 
            color: white; /* 기존 black에서 변경 */
            font-size: 45px; 
            font-weight: 700; 
            text-align: center; 
            margin-bottom: 20px; 
            z-index: 10; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .chart-container { width: 100%; height: 100%; max-height: 400px; }

        /* 3. 하단 푸터 영역 */
        footer {
            background-color: var(--footer-bg);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 30px;
            margin-top: 40px;
        }
        
        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
        }

        .footer-links { display: flex; gap: 25px; }
        .footer-links a { color: var(--text-gray); font-size: 14px; font-weight: 500; transition: 0.2s; }
        .footer-links a:hover { color: var(--text-light); text-decoration: underline; }

        .footer-info { color: #777; font-size: 13px; line-height: 1.8; }
        .footer-info .email-link { color: var(--text-gray); font-weight: 600; text-decoration: underline; transition: 0.2s; }
        .footer-info .email-link:hover { color: var(--text-light); }

        @media (max-width: 900px) {
            .top-section { grid-template-columns: 1fr; height: auto; }
            .price-area { padding: 50px 0; }
            .price-area h1 { font-size: 80px; }
            .price-area p { font-size: 40px; }
            .ad-area { height: 200px; font-size: 40px; }
            .header-left { flex-direction: column; align-items: flex-start; gap: 10px; }
            header { padding: 15px; flex-direction: column; gap: 15px; align-items: flex-start; height: auto; }
            body { padding-top: 150px; }
            .search-box input { width: 100%; }
            .bottom-section h2 { font-size: 30px; }
            .footer-links { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="#" class="logo">MESPI</a>
            <ul class="menu">
                <li><a href="#">자리</a></li>
                <li><a href="#">파티</a></li>
                <li><a href="#">팔아요</a></li>
                <li><a href="#">사요</a></li>
                <li><a href="#">자유게시판</a></li>
            </ul>
        </div>
        <div class="header-right">
            <div class="search-box">
                <input type="text" placeholder="Hinted search text">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <button class="login-btn"><i class="fa-brands fa-discord"></i> 로그인</button>
        </div>
    </header>

    <main>
        <div class="top-section">
            <div class="price-area">
                <h1>MESPI</h1>
                <p id="dynamic-price">계산중...</p>
            </div>
            <div class="ad-area">광고</div>
        </div>

        <div class="bottom-section">
            <h2 id="chart-title">데이터를 불러오는 중입니다...</h2>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="#">이용약관</a>
                <a href="#">개인정보처리방침</a>
                <a href="#">운영정책</a>
                <a href="#">광고 및 제휴 문의</a>
            </div>
            <div class="footer-info">
                <p>메이플플래닛 통합 커뮤니티 및 시세 정보 대시보드 - MESPI</p>
                <p>본 사이트는 메이플플래닛과 공식적으로 연관되어 있지 않은 유저 커뮤니티 서비스입니다.</p>
                <p>Contact : <a href="mailto:mespi.xyz@gmail.com" class="email-link">mespi.xyz@gmail.com</a></p>
                <p style="margin-top: 10px;">&copy; 2026 MESPI. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        fetch('result.json')
            .then(response => response.json())
            .then(data => {
                if (!data || data.length === 0) return;

                const latestTimestamp = data[data.length - 1].timestamp;
                const latestDataGroup = data.filter(item => item.timestamp === latestTimestamp);
                
                let sum = 0;
                latestDataGroup.forEach(item => {
                    sum += item.exchange_rate_per_1m;
                });
                
                const averagePrice = sum / latestDataGroup.length;
                document.getElementById('dynamic-price').innerText = `${Math.round(averagePrice).toLocaleString()}/1m`;

                const timestamps = [...new Set(data.map(item => item.timestamp))];
                const itemNames = [...new Set(data.map(item => item.item_name))];
                
                // [다중 그래프 로직 유지] 아이템별 꺾은선 데이터 생성
                const lineColors = ['#ff6384', '#36a2eb', '#cc65fe', '#ffce56', '#4bc0c0', '#9966ff'];
                const datasets = itemNames.map((itemName, index) => {
                    const itemPrices = timestamps.map(ts => {
                        const record = data.find(d => d.item_name === itemName && d.timestamp === ts);
                        return record ? record.exchange_rate_per_1m : null;
                    });
                    return {
                        label: itemName,
                        data: itemPrices,
                        borderColor: lineColors[index % lineColors.length],
                        backgroundColor: lineColors[index % lineColors.length],
                        borderWidth: 3, pointRadius: 4, tension: 0.3, spanGaps: true
                    };
                });

                document.getElementById('chart-title').style.display = 'none';

                // [일관성 수정] 그래프 내부 텍스트 및 그리드 색상을 다크 모드(흰색 계열)로 변경
                const ctx = document.getElementById('priceChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: { labels: timestamps, datasets: datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false }, 
                        plugins: {
                            legend: {
                                // 범례 글씨색 변경
                                labels: { color: '#fff', font: { family: 'Pretendard', size: 14 } }
                            }
                        },
                        scales: {
                            // X축(시간) 색상 변경
                            x: { 
                                ticks: { color: '#aaa', font: { family: 'Pretendard' } }, // 축 글씨색
                                grid: { color: 'rgba(255,255,255,0.05)' } // 그리드 선 색상 (아주 연하게 흰색)
                            },
                            // Y축(가격) 색상 변경
                            y: { 
                                ticks: { color: '#aaa', font: { family: 'Pretendard' } }, // 축 글씨색
                                grid: { color: 'rgba(255,255,255,0.05)' } // 그리드 선 색상
                            }
                        }
                    }
                });
            })
            .catch(error => {
                document.getElementById('dynamic-price').innerText = "Error";
                console.error("데이터를 불러오는 데 실패했습니다.", error);
            });
    </script>
</body>
</html>
